<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 簽到系統</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="script.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #222; color: white; }
        #container { position: relative; margin-top: 20px; }
        video { border-radius: 10px; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        canvas { position: absolute; top: 0; left: 0; }
        .status { margin: 20px; font-size: 1.2rem; color: #00ff00; }
    </style>
</head>
<body>
    <h2>智醫 AI 掃臉簽到</h2>
    <div class="status" id="status">正在啟動 AI 模型...</div>
    <div id="container">
        <video id="video" width="100%" height="auto" autoplay muted playsinline webkit-playsinline></video>
    </div>
</body>
</html>
